name: 🚀 Laravel CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # =========================
  # 🧪 TEST & BUILD (CI)
  # =========================
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, mysql
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: 📦 Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: ⚙️ Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🗄️ Run migrations
        env:
          DB_CONNECTION: mysql
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: 🧪 Run tests
        run: php artisan test

  # =========================
  # 🚀 DEPLOYMENT (CD)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies (prod)
        run: composer install --no-dev --optimize-autoloader

      - name: ⚙️ Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🗄️ Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: ${{ secrets.SERVER_HOST }}
          DB_DATABASE: ${{secrets.DB_NAME}}
          DB_USERNAME: ${{secrets.DB_USER_NAME}}
          DB_PASSWORD: ${{secrets.DB_USER_PASSWORD}}
        run: php artisan migrate --force

      - name: 🚀 Deploy via SSH
        uses: easingthemes/ssh-deploy@v2.1.5
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "."
          TARGET: "/home/c2012706c/public_html/laravel_oauth2"

      - name: ⚙️ Run Laravel commands on server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/c2012706c/public_html/laravel_oauth2
            php artisan down || true
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            php artisan up